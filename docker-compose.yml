services:
  seedance-chat:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL}
      MODEL: ${MODEL:-deepseek-v4-pro-260425}
      PORT: ${PORT:-3003}
    volumes:
      - seedance_output:/app/output
      - seedance_uploads:/app/uploads
      - seedance_logs:/app/logs
    restart: unless-stopped

volumes:
  seedance_output:
  seedance_uploads:
  seedance_logs:
